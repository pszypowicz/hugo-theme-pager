{{- $ctx := .Context -}}
{{- with $ctx.Site.Taxonomies.categories }}
<section class="widget widget--categories">
  <h2 class="widget__title"># categories</h2>
  <ul class="widget__taglist">
    {{- range $name, $taxonomy := . }}
    <li><a href="{{ printf "/categories/%s/" ($name | urlize) | relURL }}">{{ $name }} <span class="widget__count">{{ len $taxonomy }}</span></a></li>
    {{- end }}
  </ul>
</section>
{{- end }}
