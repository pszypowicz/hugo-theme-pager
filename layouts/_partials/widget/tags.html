{{- $ctx := .Context -}}
{{- with $ctx.Site.Taxonomies.tags }}
<section class="widget widget--tags">
  <h2 class="widget__title">tags</h2>
  <ul class="widget__taglist widget__taglist--inline">
    {{- range $name, $taxonomy := . }}
    <li><a href="{{ printf "/tags/%s/" ($name | urlize) | relURL }}">{{ $name }}</a></li>
    {{- end }}
  </ul>
</section>
{{- end }}
