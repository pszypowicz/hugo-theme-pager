baseURL                = "https://example.com/"
languageCode           = "en-us"
title                  = "example.com"
theme                  = "pager"
defaultContentLanguage = "en"

enableRobotsTXT = true
enableEmoji     = false

[pagination]
    pagerSize = 20

[permalinks]
    post = "/p/:slug/"

[minify]
    minifyOutput = true

[markup]
    [markup.goldmark.renderer]
        unsafe = true
    [markup.highlight]
        noClasses  = false
        codeFences = true
    [markup.tableOfContents]
        endLevel   = 4
        startLevel = 2

[params]
    mainSections = ["post"]
    description  = "Example site for the Pager Hugo theme."

    [params.sidebar]
        subtitle = "a monospace blog"

    [params.widgets]
        homepage = [
            { type = "about" },
            { type = "categories" },
            { type = "tags" },
        ]
        page = [
            { type = "about" },
            { type = "toc" },
        ]

        [params.widgets.about]
            title       = "about"
            description = "Short author bio, rendered on every page."

[[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "/about/"
    weight     = 10

[[menu.social]]
    identifier = "github"
    name       = "GitHub"
    url        = "https://github.com/example"
    [menu.social.params]
        icon = "brand-github"

[[menu.social]]
    identifier = "linkedin"
    name       = "LinkedIn"
    url        = "https://www.linkedin.com/in/example"
    [menu.social.params]
        icon = "brand-linkedin"
